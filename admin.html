<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🔐 Admin Panel - Ludo Kingdom</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="admin-wrapper">
        <!-- Admin Login -->
        <div id="adminLogin" class="admin-login-card">
            <div class="admin-header">
                <div class="logo">🔐</div>
                <h1>Admin Panel</h1>
                <p>Secure access for administrators</p>
            </div>
            
            <form id="adminLoginForm">
                <div class="form-group">
                    <label>Admin Username</label>
                    <input type="text" id="adminUsername" placeholder="Enter admin username" required>
                </div>
                <div class="form-group">
                    <label>Admin Password</label>
                    <input type="password" id="adminPassword" placeholder="Enter admin password" required>
                </div>
                <button type="submit" class="btn-primary">Login as Admin</button>
                <div id="adminLoginMessage" class="message"></div>
            </form>
            
            <a href="index.html" class="back-link">← Back to User Login</a>
        </div>

        <!-- Admin Dashboard -->
        <div id="adminDashboard" style="display:none;">
            <nav class="admin-nav">
                <div class="nav-brand">
                    <span>🔐</span>
                    <h2>Admin Dashboard</h2>
                </div>
                <div class="admin-user">
                    <span id="adminName">Admin</span>
                    <button class="btn-danger" onclick="adminLogout()">Logout</button>
                </div>
            </nav>

            <div class="admin-content">
                <div class="admin-stats">
                    <div class="stat-card">
                        <h3>Total Users</h3>
                        <p id="totalUsers">0</p>
                    </div>
                    <div class="stat-card">
                        <h3>Total Coins</h3>
                        <p id="totalCoins">0</p>
                    </div>
                    <div class="stat-card">
                        <h3>Games Played</h3>
                        <p id="totalGames">0</p>
                    </div>
                </div>

                <div class="admin-controls">
                    <div class="admin-card">
                        <h3>💰 Manage User Coins</h3>
                        <div class="admin-form">
                            <div class="form-group">
                                <label>Username</label>
                                <input type="text" id="adminUserSelect" placeholder="Enter username" list="userList">
                                <datalist id="userList"></datalist>
                            </div>
                            <div class="form-group">
                                <label>Action</label>
                                <select id="coinAction">
                                    <option value="add">Add Coins</option>
                                    <option value="set">Set Coins</option>
                                    <option value="remove">Remove Coins</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label>Amount</label>
                                <input type="number" id="adminCoinAmount" placeholder="Enter amount" min="0">
                            </div>
                            <button class="btn-primary" onclick="adminUpdateCoins()">Update Coins</button>
                        </div>
                        <div id="adminCoinMessage" class="message"></div>
                    </div>

                    <div class="admin-card">
                        <h3>👥 User Management</h3>
                        <div class="user-table-wrapper">
                            <table class="user-table">
                                <thead>
                                    <tr>
                                        <th>#</th>
                                        <th>Username</th>
                                        <th>W_ID</th>
                                        <th>Coins</th>
                                        <th>Status</th>
                                        <th>Action</th>
                                    </tr>
                                </thead>
                                <tbody id="userTableBody">
                                </tbody>
                            </table>
                        </div>
                    </div>

                    <div class="admin-card">
                        <h3>📊 Game Statistics</h3>
                        <div class="stats-grid">
                            <div class="stat-item">
                                <span class="stat-label">Active Games</span>
                                <span class="stat-value" id="activeGames">0</span>
                            </div>
                            <div class="stat-item">
                                <span class="stat-label">Completed Games</span>
                                <span class="stat-value" id="completedGames">0</span>
                            </div>
                            <div class="stat-item">
                                <span class="stat-label">Online Players</span>
                                <span class="stat-value" id="onlinePlayers">0</span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="admin.js"></script>
</body>
</html>
