<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎲 Ludo Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, #0a0e1a 0%, #1a1a2e 50%, #16213e 100%);
            min-height: 100vh;
            color: #fff;
        }
        
        .app {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }
        
        /* Header */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 20px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 16px;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 10px;
        }
        
        .brand {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .brand span {
            font-size: 28px;
        }
        
        .brand h2 {
            font-size: 20px;
            background: linear-gradient(135deg, #f7971e, #ffd200);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .user-info {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        
        .user-info img {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: 2px solid #f7971e;
        }
        
        .user-info span {
            color: rgba(255,255,255,0.7);
        }
        
        .btn-logout {
            padding: 8px 16px;
            border: none;
            border-radius: 10px;
            background: rgba(231,76,60,0.2);
            color: #ff6b6b;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
        }
        
        .btn-logout:hover {
            background: rgba(231,76,60,0.3);
        }
        
        /* Grid */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }
        
        .card {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 16px;
            padding: 25px;
            transition: all 0.3s;
            cursor: pointer;
        }
        
        .card:hover {
            transform: translateY(-5px);
            background: rgba(255,255,255,0.08);
            border-color: rgba(247,151,30,0.3);
        }
        
        .card .icon {
            font-size: 48px;
            margin-bottom: 15px;
            display: block;
        }
        
        .card h3 {
            font-size: 18px;
            margin-bottom: 8px;
        }
        
        .card p {
            color: rgba(255,255,255,0.6);
            font-size: 14px;
        }
        
        .card .badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            margin-top: 10px;
        }
        
        .badge-online {
            background: rgba(46,213,115,0.2);
            color: #2ecc71;
        }
        
        .badge-offline {
            background: rgba(255,255,255,0.1);
            color: rgba(255,255,255,0.5);
        }
        
        /* Users List */
        .users-list {
            margin-top: 20px;
        }
        
        .user-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 16px;
            background: rgba(255,255,255,0.03);
            border-radius: 10px;
            margin-bottom: 8px;
            border: 1px solid rgba(255,255,255,0.05);
        }
        
        .user-item .name {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .user-item .name img {
            width: 32px;
            height: 32px;
            border-radius: 50%;
        }
        
        .user-item .actions {
            display: flex;
            gap: 8px;
        }
        
        .user-item .actions button {
            padding: 6px 12px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 600;
            transition: all 0.3s;
        }
        
        .btn-call {
            background: rgba(46,213,115,0.15);
            color: #2ecc71;
        }
        
        .btn-call:hover {
            background: rgba(46,213,115,0.25);
        }
        
        .btn-chat {
            background: rgba(52,152,219,0.15);
            color: #3498db;
        }
        
        .btn-chat:hover {
            background: rgba(52,152,219,0.25);
        }
        
        /* Status */
        .status-online {
            color: #2ecc71;
        }
        
        .status-offline {
            color: rgba(255,255,255,0.3);
        }
        
        /* Responsive */
        @media (max-width: 768px) {
            .header {
                flex-direction: column;
                align-items: stretch;
                text-align: center;
            }
            
            .user-info {
                justify-content: center;
                flex-wrap: wrap;
            }
            
            .grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="app">
        <!-- Header -->
        <header class="header">
            <div class="brand">
                <span>🎲</span>
                <h2>Ludo Kingdom</h2>
            </div>
            <div class="user-info">
                <img id="userAvatar" src="" alt="">
                <span id="userName">User</span>
                <button class="btn-logout" onclick="logout()">Logout</button>
            </div>
        </header>
        
        <!-- Stats -->
        <div class="grid">
            <div class="card" onclick="alert('📞 Call feature coming soon!')">
                <span class="icon">📞</span>
                <h3>Voice Call</h3>
                <p>Call your friends with crystal clear audio</p>
                <span class="badge badge-online">Coming Soon</span>
            </div>
            
            <div class="card" onclick="alert('💬 Chat feature coming soon!')">
                <span class="icon">💬</span>
                <h3>Live Chat</h3>
                <p>Send messages and share moments</p>
                <span class="badge badge-online">Coming Soon</span>
            </div>
            
            <div class="card" onclick="alert('🎮 Game feature coming soon!')">
                <span class="icon">🎮</span>
                <h3>Play Ludo</h3>
                <p>Play Ludo with friends online</p>
                <span class="badge badge-online">Coming Soon</span>
            </div>
        </div>
        
        <!-- Users -->
        <div style="margin-top:30px;">
            <h3 style="margin-bottom:15px;">👥 Online Users</h3>
            <div class="users-list" id="usersList">
                <div class="user-item">
                    <div class="name">
                        <img src="https://ui-avatars.com/api/?name=John&background=3498db&color=fff" alt="">
                        <span>John <span class="status-online">● Online</span></span>
                    </div>
                    <div class="actions">
                        <button class="btn-call" onclick="alert('Calling John...')">📞 Call</button>
                        <button class="btn-chat" onclick="alert('Chat with John...')">💬 Chat</button>
                    </div>
                </div>
                
                <div class="user-item">
                    <div class="name">
                        <img src="https://ui-avatars.com/api/?name=Sarah&background=2ecc71&color=fff" alt="">
                        <span>Sarah <span class="status-online">● Online</span></span>
                    </div>
                    <div class="actions">
                        <button class="btn-call" onclick="alert('Calling Sarah...')">📞 Call</button>
                        <button class="btn-chat" onclick="alert('Chat with Sarah...')">💬 Chat</button>
                    </div>
                </div>
                
                <div class="user-item">
                    <div class="name">
                        <img src="https://ui-avatars.com/api/?name=Mike&background=e74c3c&color=fff" alt="">
                        <span>Mike <span class="status-offline">● Offline</span></span>
                    </div>
                    <div class="actions">
                        <button class="btn-call" style="opacity:0.5;cursor:not-allowed;">📞 Call</button>
                        <button class="btn-chat" style="opacity:0.5;cursor:not-allowed;">💬 Chat</button>
                    </div>
                </div>
                
                <div class="user-item">
                    <div class="name">
                        <img src="https://ui-avatars.com/api/?name=Emma&background=f1c40f&color=000" alt="">
                        <span>Emma <span class="status-online">● Online</span></span>
                    </div>
                    <div class="actions">
                        <button class="btn-call" onclick="alert('Calling Emma...')">📞 Call</button>
                        <button class="btn-chat" onclick="alert('Chat with Emma...')">💬 Chat</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ---------- DASHBOARD ----------
        function initDashboard() {
            const session = localStorage.getItem('ludo_session');
            if (!session) {
                window.location.href = 'index.html';
                return;
            }
            
            const user = JSON.parse(session);
            document.getElementById('userName').textContent = user.username;
            document.getElementById('userAvatar').src = user.avatar || `https://ui-avatars.com/api/?name=${user.username}&background=f7971e&color=fff`;
        }
        
        function logout() {
            localStorage.removeItem('ludo_session');
            window.location.href = 'index.html';
        }
        
        // ---------- INIT ----------
        document.addEventListener('DOMContentLoaded', initDashboard);
    </script>
</body>
</html>
