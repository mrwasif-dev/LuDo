<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎲 Original Ludo Game</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="game-wrapper">
        <!-- Header -->
        <nav class="game-nav">
            <div class="nav-brand">
                <span>🎲</span>
                <h2>Ludo Kingdom</h2>
            </div>
            <div class="nav-user">
                <div class="user-stats">
                    <span>👤 <span id="currentUser">Guest</span></span>
                    <span>💰 <span id="userCoins">0</span></span>
                    <span>🏆 <span id="userWins">0</span></span>
                </div>
                <button class="btn-danger" onclick="logout()">🚪 Logout</button>
            </div>
        </nav>

        <!-- Game Modes -->
        <div class="game-modes">
            <button class="mode-btn active" onclick="startGame(2)">👥 2 Players</button>
            <button class="mode-btn" onclick="startGame(4)">👥👥 4 Players</button>
            <button class="mode-btn" onclick="startGame(0)">💻 vs Computer</button>
        </div>

        <!-- Main Game -->
        <div class="game-area">
            <div class="board-container">
                <div class="ludo-board" id="ludoBoard"></div>
            </div>
            
            <div class="side-panel">
                <div class="dice-section">
                    <div class="dice" id="dice">🎲</div>
                    <button class="roll-btn" onclick="rollDice()" id="rollBtn">Roll Dice</button>
                    <div class="turn-info" id="turnInfo">Waiting...</div>
                </div>
                
                <div class="players-section">
                    <h4>👥 Players</h4>
                    <div id="playersList"></div>
                </div>
                
                <div class="history-section">
                    <h4>📜 History</h4>
                    <div id="gameLog"></div>
                </div>
            </div>
        </div>

        <!-- Winner Modal -->
        <div class="modal" id="winnerModal">
            <div class="modal-content">
                <h2>🏆 Game Over!</h2>
                <p id="winnerText">Player wins!</p>
                <button class="btn-primary" onclick="restartGame()">🔄 Play Again</button>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
