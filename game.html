<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎲 Ludo Kingdom - Original Game</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="game-wrapper">
        <!-- Navigation -->
        <nav class="game-nav">
            <div class="nav-brand">
                <span>🎲</span>
                <h2>Ludo Kingdom</h2>
            </div>
            <div class="nav-user">
                <div class="user-stats">
                    <span class="stat-item">👤 <span id="currentUser">Guest</span></span>
                    <span class="stat-item">🆔 <span id="userWid">N/A</span></span>
                    <span class="stat-item coin-display">💰 <span id="userCoins">0</span></span>
                    <span class="stat-item">🏆 <span id="userWins">0</span></span>
                </div>
                <div class="nav-actions">
                    <button class="btn-danger" onclick="logout()">🚪 Logout</button>
                </div>
            </div>
        </nav>

        <!-- Game Modes -->
        <section class="game-modes">
            <button class="mode-btn active" data-mode="2player" onclick="selectMode('2player')">
                <span>👥</span> 2 Players
            </button>
            <button class="mode-btn" data-mode="4player" onclick="selectMode('4player')">
                <span>👥👥</span> 4 Players
            </button>
            <button class="mode-btn" data-mode="computer" onclick="selectMode('computer')">
                <span>💻</span> vs Computer
            </button>
            <button class="mode-btn" data-mode="online" onclick="selectMode('online')">
                <span>🌐</span> Online
            </button>
        </section>

        <!-- Main Game Area -->
        <div class="game-area">
            <div class="game-board-wrapper">
                <div class="ludo-board" id="ludoBoard">
                    <!-- Board rendered by JavaScript -->
                </div>
            </div>
            
            <div class="game-sidebar">
                <div class="game-controls">
                    <div class="dice-container">
                        <div class="dice-display" id="diceResult">🎲</div>
                        <button class="btn-roll" onclick="rollDice()" id="rollBtn">
                            Roll Dice
                        </button>
                    </div>
                    <div class="turn-indicator" id="turnIndicator">
                        <span>⏳ Waiting for turn...</span>
                    </div>
                </div>
                
                <div class="game-info">
                    <div class="status-card">
                        <h4>📊 Game Status</h4>
                        <p id="gameStatus">Select mode and start playing!</p>
                    </div>
                    
                    <div class="players-list">
                        <h4>👥 Players</h4>
                        <div id="playerItems"></div>
                    </div>
                    
                    <div class="game-history">
                        <h4>📜 Game Log</h4>
                        <div id="historyLog"></div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Game Over Modal -->
        <div class="modal" id="gameOverModal">
            <div class="modal-content">
                <div class="modal-header">
                    <h2>🏆 Game Over!</h2>
                </div>
                <div class="modal-body">
                    <p id="winnerMessage">Player wins!</p>
                    <div class="modal-stats">
                        <div>
                            <span>Coins Earned</span>
                            <span id="coinsEarned">+0</span>
                        </div>
                        <div>
                            <span>Total Coins</span>
                            <span id="totalCoinsEarned">0</span>
                        </div>
                    </div>
                </div>
                <div class="modal-footer">
                    <button class="btn-primary" onclick="restartGame()">🔄 Play Again</button>
                    <button class="btn-secondary" onclick="closeModal()">Close</button>
                </div>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
