<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎲 Ludo Kingdom - Game</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="game-wrapper">
        <!-- Navigation -->
        <nav class="game-nav">
            <div class="nav-brand">
                <span>🎲</span>
                <h2>Ludo Kingdom</h2>
            </div>
            <div class="nav-user">
                <div class="user-stats">
                    <span class="stat-item">👤 <span id="currentUser">Guest</span></span>
                    <span class="stat-item">🆔 <span id="userWid">N/A</span></span>
                    <span class="stat-item coin-display">💰 <span id="userCoins">0</span></span>
                </div>
                <div class="nav-actions">
                    <button class="btn-icon" onclick="toggleAdmin()" id="adminToggle" style="display:none;">⚙️</button>
                    <button class="btn-danger" onclick="logout()">🚪 Logout</button>
                </div>
            </div>
        </nav>

        <!-- Game Modes -->
        <section class="game-modes">
            <button class="mode-btn active" data-mode="online" onclick="selectMode('online')">
                <span>🌐</span> Online
            </button>
            <button class="mode-btn" data-mode="computer" onclick="selectMode('computer')">
                <span>💻</span> Computer
            </button>
            <button class="mode-btn" data-mode="local" onclick="selectMode('local')">
                <span>🏠</span> Local
            </button>
        </section>

        <!-- Main Game Area -->
        <div class="game-area">
            <div class="game-board-wrapper">
                <div class="ludo-board" id="ludoBoard"></div>
            </div>
            
            <div class="game-sidebar">
                <div class="game-controls">
                    <button class="btn-roll" onclick="rollDice()" id="rollBtn">
                        🎲 Roll Dice
                    </button>
                    <div class="dice-display" id="diceResult">-</div>
                </div>
                
                <div class="game-info">
                    <div class="status-card">
                        <h4>Game Status</h4>
                        <p id="gameStatus">Ready to play! Roll the dice.</p>
                    </div>
                    <div class="players-list" id="playersList">
                        <h4>Players</h4>
                        <div id="playerItems"></div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Admin Panel -->
        <div class="admin-panel" id="adminPanel" style="display:none;">
            <div class="admin-card">
                <h3>⚙️ Admin Panel</h3>
                <div class="admin-controls">
                    <div class="form-group">
                        <label>Username</label>
                        <input type="text" id="adminUsername" placeholder="Enter username">
                    </div>
                    <div class="form-group">
                        <label>Coins</label>
                        <input type="number" id="adminCoins" placeholder="Enter coins" min="0">
                    </div>
                    <button class="btn-primary" onclick="updateCoins()">Update Coins</button>
                </div>
                <div id="adminMessage" class="message"></div>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
